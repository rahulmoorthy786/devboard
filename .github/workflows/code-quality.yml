# Goal I have to do SAST for my code

name: Code Quality

on:
    workflow_call:   # you can call this workflow before /after any workflow

jobs:
    sast:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v7
            
          - name: Setup NodeJs
            uses: actions/setup-node@v6
            with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

          - name: Install npm Package
            run: npm install
            working-directory: frontend

          - name: Run Linter
            run: npm run lint
            working-directory: frontend   

          - name: Setup Go
            uses: actions/setup-go@v5
            with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: 'go.sum'

          - name: Run Go Formatter
            run: go fmt
            working-directory: backend

          - name: Run Go Vet
            run: go vet 
            working-directory: backend  