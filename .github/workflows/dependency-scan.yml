# Goal - I have to ensure the packages and dependencies have been audited for any vulnerabilities.

name: Dependency Scan

on:
    workflow_call:

jobs:
    dependency-scan:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v7
            
          - name: Setup Go
            uses: actions/setup-go@v6 
            with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: 'go.sum'
                
          - name: Install Govulncheck
            run: go install golang.org/x/vuln/cmd/govulncheck@1.1.4
            
          - name: Run Govulncheck
            continue-on-error: true
            run: govulncheck ./... > govulncheck-report.txt
            working-directory: backend

          - name: Setup node
            uses: actions/setup-node@v6 
            with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
                
          - name: Run npm audit
            run: npm audit
            working-directory: frontend
            

          - name: Upload Test Report
            uses: actions/upload-artifact@v4
            if: always() # Ensure report uploads even if the job fails
            with:
                name: job-report
                path: reports/govulncheck-report.txt
                retention-days: 5  