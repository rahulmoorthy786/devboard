# Goal - I have to Lint, Build, Test the code for Frontend, Backend. Then push the images to DockerHub.

name: CI

on:
  workflow_dispatch:
    

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      

      - name: Run Test
        run: npm run test
        working-directory: frontend


  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Run Go Formatter
        run: go fmt
        working-directory: backend

      - name: Run Go Vet
        run: go vet 
        working-directory: backend

      - name: Run Test
        run: go test
        working-directory: backend

          
  build-and-push:
    needs: [lint-frontend,lint-backend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [frontend, backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with: 
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.folder }}
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest   


  deploy:
    needs: [lint-frontend,lint-backend,build-and-push] 
    uses: ./.github/workflows/cd.yml
    secrets: inherit        

  


